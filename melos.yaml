name: notiflow_workspace
repository: https://github.com/dwidev/notiflow

packages:
  - packages/**
  - examples/**

command:
  bootstrap:
    usePubspecOverrides: true

scripts:
  # ─── Analysis ──────────────────────────────────────────
  analyze:
    run: melos exec -- "flutter analyze --no-fatal-infos"
    description: Run `flutter analyze` in all packages.
    packageFilters:
      flutter: true

  # ─── Testing ───────────────────────────────────────────
  test:
    run: melos exec -- "flutter test"
    description: Run `flutter test` in all packages.
    packageFilters:
      dirExists: test
      flutter: true

  test:core:
    run: melos exec --scope="notiflow" -- "flutter test"
    description: Run tests only for notiflow core package.

  # ─── Formatting ────────────────────────────────────────
  format:
    run: melos exec -- "dart format ."
    description: Run `dart format` in all packages.

  format:check:
    run: melos exec -- "dart format --set-exit-if-changed ."
    description: Check formatting in all packages.

  # ─── Code Generation (if needed) ──────────────────────
  clean:
    run: melos exec -- "flutter clean"
    description: Run `flutter clean` in all packages.
    packageFilters:
      flutter: true

  # ─── Pub ───────────────────────────────────────────────
  pub:get:
    run: melos exec -- "flutter pub get"
    description: Run `flutter pub get` in all packages.
    packageFilters:
      flutter: true

  # ─── Quality Gate (CI) ────────────────────────────────
  ci:
    description: Run all checks (format, analyze, test) — used in CI.
    steps:
      - format:check
      - analyze
      - test
