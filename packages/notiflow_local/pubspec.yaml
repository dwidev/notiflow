name: notiflow_local
description: "Local Notifications plugin for NotiFlow — auto-listen to flutter_local_notifications events."
version: 0.0.1
homepage: https://github.com/your-org/notiflow
repository: https://github.com/your-org/notiflow/tree/main/packages/notiflow_local

environment:
  sdk: ^3.12.2
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter
  notiflow:
    path: ../notiflow
  flutter_local_notifications: ^18.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
